<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
  </head>
  <body>
    <h2>Fruits</h2>
    <ul>
      <li>Mango</li>
      <li>Banana</li>
      <li>Orange</li>
      <li>Pineapple</li>
    </ul>

    <h2>Steps to Make Coffee</h2>
    <ol>
      <li>Boil water</li>
      <li>Add coffee powder to a cup</li>
      <li>Pour hot water into the cup</li>
      <li>Add sugar and milk as desired</li>
      <li>Stir and enjoy</li>
    </ol>
  </body>
</html>
